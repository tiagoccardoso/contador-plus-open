
name: contador_plus
description: Contador+ — Calendário fiscal minimalista com IA
publish_to: "none"
version: 0.0.2+101

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  http: ^1.2.2
  crypto: ^3.0.6
  html: ^0.15.4
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  intl: ^0.20.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hooks_riverpod: ^2.5.1
  go_router: ^14.2.3
  flutter_dotenv: ^5.1.0
  equatable: ^2.0.5
  dio: ^5.7.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.5
  webview_flutter_wkwebview: ^3.13.1
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/reforma/events.json
    - assets/branding/
    - assets/seeds/
    - assets/trails/
    - assets/holidays/
    - assets/legal/
    - assets/data/
    - .env
flutter_launcher_icons:
  android: true
  min_sdk_android: 23
  adaptive_icon_background: "assets/branding/icon_bg.png"
  adaptive_icon_foreground: "assets/branding/icon_fg.png"
  image_path_android: "assets/branding/logo-1024.png"
